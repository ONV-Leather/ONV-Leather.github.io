<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ONV Leather · Кожаные изделия ручной работы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{color-scheme:dark}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;background:linear-gradient(160deg,#102635 0%,#184054 45%,#223d56 100%);color:#efe8db}
    .deco-frame{border:1px solid rgba(196,163,90,0.12);position:relative;overflow:hidden}
    .hero-wrap{display:flex;align-items:center;justify-content:center;width:100%}
    .hero-img{width:100%;height:66vh;max-height:80vh;object-fit:contain;object-position:center 60%;display:none;margin:0 auto;transition:opacity .45s}
    @media(max-width:640px){.hero-img{height:46vh}}
    .no-hero{display:none;grid;place-items:center;padding:3rem 0;color:rgba(255,255,255,0.06);font-size:0.95rem}
    .portfolio-card{transition:transform .28s,box-shadow .28s;background:linear-gradient(180deg, rgba(6,10,12,0.45), rgba(8,12,14,0.35));}
    .portfolio-card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(2,6,10,0.6)}
    .muted{color:rgba(245,240,232,0.65)}
    .text-deco-gold{color:#C4A35A}
    .modal-exit{opacity:0;pointer-events:none}
    .modal-enter{opacity:1;pointer-events:auto;transition:opacity .22s}
    #modal-close{z-index:99999;position:absolute;top:10px;right:10px;background:#C4A35A;color:#071018;border:none;padding:7px 10px;border-radius:8px;font-size:18px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
    @media(max-width:420px){#modal-close{padding:8px 11px;font-size:20px}}
    #modal-thumbs{display:flex;gap:8px;padding:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    #modal-thumbs img{flex:0 0 auto;width:72px;height:44px;object-fit:cover;border-radius:6px}
    @media(max-width:420px){#modal-thumbs img{width:60px;height:40px}}
    /* spinner */
    .spinner{width:44px;height:44px;border:5px solid rgba(255,255,255,0.08);border-top-color:#C4A35A;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .center{display:flex;align-items:center;justify-content:center}
  </style>
</head>
<body class="antialiased">

<header class="fixed w-full z-40">
  <div class="backdrop-blur-md bg-black/20 border-b border-deco-gold/8">
    <div class="max-w-7xl mx-auto px-5 md:px-8 lg:px-12 flex items-center justify-between h-16">
      <a href="#" class="flex items-baseline gap-3"><span class="text-deco-gold text-xl md:text-2xl">ONV Leather</span></a>
      <button id="menu-toggle" class="md:hidden p-2" aria-label="menu">☰</button>
    </div>
  </div>
</header>

<main class="pt-20">
  <section id="hero" class="relative deco-frame mb-6">
    <div class="max-w-6xl mx-auto px-5 md:px-8 lg:px-12 py-8">
      <div id="hero-container" class="hero-wrap">
        <img id="hero-img" class="hero-img" alt="Шляпа" loading="lazy">
        <div id="hero-fallback" class="no-hero">Фоновая фотография не найдена в assets/images/hero/</div>
      </div>
      <div class="relative z-20 text-center mt-6">
        <h1 class="font-display text-3xl md:text-5xl lg:text-6xl">Австралийские шляпы и аксессуары</h1>
        <p class="mt-4 muted max-w-2xl mx-auto">Ручная работа. Кожа высокого качества. Индивидуальный подход к каждому клиенту.</p>
        <div class="mt-6"><a href="#catalog" class="inline-flex gap-3 px-6 py-3 border border-deco-gold/60 text-deco-gold hover:bg-deco-gold hover:text-black rounded-sm uppercase tracking-wider">Смотреть коллекцию</a></div>
      </div>
    </div>
  </section>

  <section id="catalog" class="py-10 px-5 md:px-8 lg:px-12 max-w-7xl mx-auto">
    <div class="text-center mb-8">
      <div class="text-sm text-deco-gold/70 uppercase tracking-wide">Коллекция</div>
      <h2 class="text-3xl md:text-4xl mt-3">Избранные работы</h2>
    </div>
    <div id="portfolio-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <!-- grid will be rendered -->
    </div>
  </section>

  <footer class="py-10 px-5 md:px-8 lg:px-12 border-t border-deco-gold/8">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
      <div><div class="text-deco-gold text-xl">ONV Leather</div><div class="muted text-sm mt-2">© <span id="year"></span></div></div>
    </div>
  </footer>
</main>

<!-- modal -->
<div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-exit bg-black/70 backdrop-blur-sm" aria-hidden="true">
  <div class="relative bg-[#091118] border border-deco-gold/15 max-w-4xl w-full rounded-sm shadow-2xl overflow-hidden">
    <button id="modal-close" data-modal-close aria-label="Закрыть">✕</button>
    <div class="md:flex">
      <div class="md:w-1/2 bg-black/20 p-4">
        <div class="relative">
          <img id="modal-image" src="" alt="" class="w-full h-80 object-cover">
          <button id="prev-image" class="absolute left-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-black/50 text-deco-gold rounded-sm">‹</button>
          <button id="next-image" class="absolute right-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-black/50 text-deco-gold rounded-sm">›</button>
        </div>
        <div id="modal-thumbs" class="mt-3"></div>
      </div>
      <div class="md:w-1/2 p-6 flex flex-col gap-4">
        <div id="modal-status" class="inline-block px-3 py-1 text-xs uppercase font-medium border rounded-sm"></div>
        <h3 id="modal-title" class="text-2xl"></h3>
        <p id="modal-description" class="muted text-sm"></p>
        <div class="mt-3"><div id="modal-price" class="text-deco-gold text-xl font-semibold"></div></div>
        <div id="modal-loading" class="center mt-3" style="display:none"><div class="spinner"></div></div>
        <div class="mt-auto"><a id="modal-order-btn" class="inline-flex items-center gap-3 px-5 py-3 border border-deco-gold/70 text-deco-gold hover:bg-deco-gold hover:text-black rounded-sm">Заказать</a></div>
      </div>
    </div>
  </div>
</div>

<script>
/*
  Быстрый, надёжный discovery через GitHub REST Contents API.
  - Один fetch на папку (hero, item-1..item-8)
  - Формируем raw.githubusercontent URLs
  - Кэш в localStorage на 10 минут (чтобы повторные загрузки были мгновенными)
*/
(async function(){
  const owner = 'ONV-Leather';
  const repo = 'ONV-Leather.github.io';
  const branch = 'main';
  const baseApi = `https://api.github.com/repos/${owner}/${repo}/contents/`;
  const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/`;
  const itemCount = 8;
  const exts = ['jpg','jpeg','png','webp'];
  const heroPath = 'assets/images/hero';
  const itemsPrefix = 'assets/images/item-';
  const placeholder = 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900"><rect width="100%" height="100%" fill="#222831"/><text x="50%" y="50%" fill="#9aa0a6" font-size="28" font-family="Arial" text-anchor="middle" dominant-baseline="middle">Фото отсутствует</text></svg>`);

  // portfolioItems meta (images empty -> filled from API)
  window.portfolioItems = [];
  for(let i=1;i<=itemCount;i++){
    window.portfolioItems.push({ id:i, title:`Товар ${i}`, price:'—', status:'', images:[], description:'', orderLink:'#' });
  }

  // cache helpers
  const CACHE_KEY = 'onv_manifest_v1';
  const CACHE_TTL = 10 * 60 * 1000; // 10 minutes
  function readCache(){ try{ const raw = localStorage.getItem(CACHE_KEY); if(!raw) return null; const obj = JSON.parse(raw); if(Date.now() - obj.ts > CACHE_TTL) return null; return obj.data;}catch(e){return null;} }
  function writeCache(data){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); }catch(e){} }

  // utility: fetch JSON directory listing
  async function listDir(path){
    const url = baseApi + encodeURIComponent(path) + `?ref=${branch}`;
    try {
      const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' }});
      if(!res.ok) return [];
      const json = await res.json();
      // json is array of { name, path, type }
      return Array.isArray(json) ? json : [];
    } catch(e){
      console.warn('listDir error', e, url);
      return [];
    }
  }

  // build images list from directory entries (filter by extension and return raw URLs)
  function buildImagesFromEntries(entries){
    const files = entries
      .filter(e => e.type === 'file' && typeof e.name === 'string')
      .filter(e => {
        const nm = e.name.toLowerCase();
        return exts.some(ext => nm.endsWith('.' + ext));
      })
      .map(e => ({ name: e.name, path: e.path }));
    // sort by name natural (01,02,... Hat1, Hat2 etc.)
    files.sort((a,b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
    return files.map(f => rawBase + f.path);
  }

  // Try cache first
  let manifest = readCache();
  if(!manifest){
    manifest = { hero: [], items: {} };
    // Parallelize folder requests (hero + items)
    const promises = [];
    // hero
    promises.push(listDir(heroPath).then(entries => manifest.hero = buildImagesFromEntries(entries)));
    // items
    for(let i=1;i<=itemCount;i++){
      const p = `${itemsPrefix}${i}`;
      promises.push(listDir(p).then(entries => manifest.items['item-' + i] = buildImagesFromEntries(entries)));
    }
    await Promise.all(promises);
    writeCache(manifest);
  }

  // populate portfolioItems images from manifest
  for(const it of window.portfolioItems){
    const key = 'item-' + it.id;
    if(manifest.items[key] && manifest.items[key].length) {
      it.images = manifest.items[key].slice(); // copy
      it._discovered = true;
    } else {
      it.images = [];
      it._discovered = true; // no images found but considered discovered
    }
  }

  // render grid now (fast)
  function renderGrid(){
    const grid = document.getElementById('portfolio-grid');
    grid.innerHTML = window.portfolioItems.map(item => {
      const thumb = (item.images && item.images.length) ? item.images[0] : placeholder;
      // show title/price from repo if you want to edit these fields in code; keep default for now
      return `
        <article class="portfolio-card deco-frame rounded-sm overflow-hidden border border-transparent cursor-pointer" tabindex="0" data-id="${item.id}">
          <div class="aspect-[3/4] overflow-hidden relative">
            <img src="${thumb}" alt="${item.title}" class="w-full h-full object-cover" onerror="this.src='${placeholder}'">
          </div>
          <div class="p-4 flex flex-col h-36">
            <h3 class="font-display text-lg text-deco-warm/95">${item.title}</h3>
            <div class="mt-2 flex items-center justify-between">
              <div class="text-deco-gold font-semibold">${item.price}</div>
              <div class="text-xs muted uppercase">Подробнее →</div>
            </div>
          </div>
        </article>`;
    }).join('');
    attachGridHandlers();
  }

  // modal utilities
  const modal = document.getElementById('product-modal');
  const modalImage = document.getElementById('modal-image');
  const modalTitle = document.getElementById('modal-title');
  const modalDescription = document.getElementById('modal-description');
  const modalPrice = document.getElementById('modal-price');
  const modalStatus = document.getElementById('modal-status');
  const modalOrderBtn = document.getElementById('modal-order-btn');
  const modalThumbs = document.getElementById('modal-thumbs');
  const modalLoading = document.getElementById('modal-loading');
  const prevBtn = document.getElementById('prev-image');
  const nextBtn = document.getElementById('next-image');
  let currentItem=null, currentIndex=0;

  function showModalSpinner(show){
    modalLoading.style.display = show ? 'flex' : 'none';
  }

  function updateModal(){
    if(!currentItem) return;
    const imgs = currentItem.images && currentItem.images.length ? currentItem.images : [placeholder];
    modalImage.src = imgs[currentIndex] || placeholder;
    modalTitle.textContent = currentItem.title || '';
    modalDescription.textContent = currentItem.description || '';
    modalPrice.textContent = currentItem.price || '';
    modalStatus.textContent = currentItem.status || '';
    modalOrderBtn.href = currentItem.orderLink || '#';
    modalThumbs.innerHTML = imgs.map((s,idx)=>`<img src="${s}" data-idx="${idx}" onerror="this.src='${placeholder}'">`).join('');
  }

  function openModal(item){
    currentItem = item;
    currentIndex = 0;
    // show spinner only if images not loaded yet
    const needLoading = !(item.images && item.images.length);
    showModalSpinner(needLoading);
    updateModal();
    modal.classList.remove('modal-exit'); modal.classList.add('modal-enter'); modal.setAttribute('aria-hidden','false'); modal.style.pointerEvents='auto'; document.body.style.overflow='hidden';
    // If images empty (shouldn't because we filled from manifest), try to fetch directory live as fallback
    if((!item.images || item.images.length === 0) && !item._fetching){
      item._fetching = true;
      listDir(`${itemsPrefix}${item.id}`).then(entries => {
        const imgs = buildImagesFromEntries(entries);
        if(imgs.length){
          item.images = imgs;
          updateCardThumb(item.id, imgs[0]);
          if(currentItem && currentItem.id === item.id){
            showModalSpinner(false);
            updateModal();
          }
        } else {
          showModalSpinner(false);
        }
      }).catch(()=> showModalSpinner(false)).finally(()=> item._fetching = false);
    } else {
      showModalSpinner(false);
    }
  }

  function closeModal(){ modal.classList.remove('modal-enter'); modal.classList.add('modal-exit'); modal.setAttribute('aria-hidden','true'); modal.style.pointerEvents='none'; document.body.style.overflow=''; currentItem=null; }
  function showIndex(i){ if(!currentItem) return; if(i<0) i = currentItem.images.length-1; if(i>=currentItem.images.length) i=0; currentIndex=i; updateModal(); }

  function attachGridHandlers(){
    const grid = document.getElementById('portfolio-grid');
    grid.querySelectorAll('.portfolio-card').forEach(card=>{
      card.addEventListener('click', () => {
        const id = +card.dataset.id;
        const item = window.portfolioItems.find(p=>p.id===id);
        if(item) openModal(item);
      });
      card.addEventListener('keydown', (e) => {
        if(e.key === 'Enter' || e.key === ' ') {
          const id = +card.dataset.id;
          const item = window.portfolioItems.find(p=>p.id===id);
          if(item) openModal(item);
        }
      });
    });
  }

  // utility: update card thumb
  function updateCardThumb(itemId, url){
    const img = document.querySelector(`#portfolio-grid article[data-id="${itemId}"] img`);
    if(img) img.src = url;
  }

  // modal controls
  document.getElementById('modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=> { if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e)=> { if(e.key === 'Escape') closeModal(); if(e.key === 'ArrowLeft') showIndex(currentIndex-1); if(e.key === 'ArrowRight') showIndex(currentIndex+1); });
  if(prevBtn) prevBtn.addEventListener('click', ()=> showIndex(currentIndex-1));
  if(nextBtn) nextBtn.addEventListener('click', ()=> showIndex(currentIndex+1));
  modalThumbs.addEventListener('click', (e)=> { const img = e.target.closest('img'); if(!img) return; showIndex(+img.dataset.idx); });

  // hero discovery & rotation
  function buildImagesFromEntries(entries){
    return entries
      .filter(e => e.type === 'file' && typeof e.name === 'string' )
      .filter(e => exts.some(ext => e.name.toLowerCase().endsWith('.'+ext)))
      .sort((a,b)=> a.name.localeCompare(b.name, undefined, { numeric:true, sensitivity:'base' }))
      .map(e => rawBase + e.path);
  }
  function startHeroRotation(list){
    const heroEl = document.getElementById('hero-img');
    const fallback = document.getElementById('hero-fallback');
    if(!list || list.length === 0){ heroEl.style.display='none'; fallback.style.display='block'; return; }
    fallback.style.display='none'; heroEl.style.display='block';
    let idx=0; heroEl.src = list[0];
    setInterval(()=>{ idx=(idx+1)%list.length; heroEl.style.opacity='0'; setTimeout(()=>{ heroEl.src=list[idx]; heroEl.style.opacity='1'; },260); }, 3000);
  }

  // initial render + use manifest to set thumbs
  renderGrid();

  // After render, set thumbs using manifest (already populated above)
  window.portfolioItems.forEach(it => {
    if(it.images && it.images.length) updateCardThumb(it.id, it.images[0]);
  });

  // load hero images from manifest if present; if manifest had hero, start rotation
  (function applyHero(){
    try{
      const cache = JSON.parse(localStorage.getItem('onv_manifest_v1') || '{}');
      const data = cache.data || {};
      const heroList = data.hero || [];
      if(heroList.length){
        // raw URLs already built in manifest earlier - if not, convert names to rawBase path
        const resolved = heroList.map(p => p.startsWith('http') ? p : rawBase + p);
        startHeroRotation(resolved);
      } else {
        // try fetch hero dir live (fast)
        listDir(heroPath).then(entries => {
          const files = entries.filter(e => e.type === 'file').filter(e=>exts.some(ext=>e.name.toLowerCase().endsWith('.'+ext))).sort((a,b)=>a.name.localeCompare(b.name, undefined, {numeric:true})).map(e=> rawBase + e.path);
          startHeroRotation(files);
        });
      }
    }catch(e){ console.warn('hero apply error', e); }
  })();

  // utility: rawBase used above; define now
  const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/`;

  // Helper to fetch dir on demand (used as fallback)
  async function listDir(path){
    const url = baseApi + encodeURIComponent(path) + `?ref=${branch}`;
    try{
      const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' }});
      if(!res.ok) return [];
      const json = await res.json();
      return Array.isArray(json) ? json : [];
    }catch(e){ console.warn('listDir fetch error', e); return []; }
  }

  // If manifest was older than TTL or absent, background-refresh it (so next visit is fast)
  (async function refreshManifestInBackground(){
    try{
      const nowManifest = readCache ? readCache() : null;
      // do not block UI; try to fetch again and rewrite cache
      const paths = [heroPath];
      for(let i=1;i<=8;i++) paths.push(`${itemsPrefix}${i}`);
      const promises = paths.map(p => listDir(p));
      const results = await Promise.all(promises);
      const fresh = { hero: buildImagesFromEntries(results[0] || []), items: {} };
      for(let i=1;i<=8;i++){
        fresh.items['item-'+i] = buildImagesFromEntries(results[i] || []);
      }
      writeCache && writeCache(fresh);
    }catch(e){ /* ignore background errors */ }
  })();

  // helpers for cache read/write used above - re-declare here for scoping
  function readCache(){ try{ const raw = localStorage.getItem('onv_manifest_v1'); if(!raw) return null; const obj = JSON.parse(raw); if(Date.now() - obj.ts > 10*60*1000) return null; return obj; }catch(e){return null;} }
  function writeCache(data){ try{ localStorage.setItem('onv_manifest_v1', JSON.stringify({ ts: Date.now(), data })); }catch(e){} }

  // finally, set year
  document.getElementById('year').textContent = new Date().getFullYear();

})();
</script>
</body>
</html>
