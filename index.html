<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>KAIZEN & DECO · Кожа ручной работы</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root { color-scheme: dark; }
    html,body { height:100%; margin:0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background: linear-gradient(160deg,#102635 0%,#184054 45%,#223d56 100%); color:#efe8db; -webkit-font-smoothing:antialiased; }
    .deco-frame{border:1px solid rgba(196,163,90,0.12);position:relative;overflow:hidden}
    .hero-img{width:100%;height:66vh;max-height:80vh;object-fit:contain;object-position:center 60%;display:block;margin:0 auto;transition:opacity .45s}
    @media (max-width:640px){ .hero-img{height:46vh} }
    .portfolio-card{transition:transform .28s,box-shadow .28s;background:linear-gradient(180deg, rgba(6,10,12,0.45), rgba(8,12,14,0.35));}
    .portfolio-card:hover{transform:translateY(-6px);box-shadow:0 18px 40px rgba(2,6,10,0.6)}
    .muted{color:rgba(245,240,232,0.65)}
    .text-deco-gold{color:#C4A35A}
    .modal-exit{opacity:0;pointer-events:none}
    .modal-enter{opacity:1;pointer-events:auto;transition:opacity .22s}
    #modal-close{z-index:99999;position:absolute;top:10px;right:10px;background:#C4A35A;color:#071018;border:none;padding:7px 10px;border-radius:8px;font-size:18px;line-height:1;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
    @media (max-width:420px){ #modal-close{padding:8px 11px;font-size:20px} }
    #modal-thumbs{display:flex;gap:8px;padding:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    #modal-thumbs img{flex:0 0 auto;width:72px;height:44px;object-fit:cover;border-radius:6px}
    @media (max-width:420px){ #modal-thumbs img{width:60px;height:40px} }
  </style>
</head>
<body class="antialiased">

<header class="fixed w-full z-40">
  <div class="backdrop-blur-md bg-black/20 border-b border-deco-gold/8">
    <div class="max-w-7xl mx-auto px-5 md:px-8 lg:px-12 flex items-center justify-between h-16">
      <a href="#" class="flex items-baseline gap-3"><span class="font-display text-deco-gold text-xl md:text-2xl">KAIZEN & DECO</span></a>
      <button id="menu-toggle" class="md:hidden p-2" aria-label="menu">☰</button>
    </div>
    <div id="mobile-menu" class="md:hidden hidden bg-black/40 border-t border-deco-gold/8">
      <div class="px-5 py-6 flex flex-col gap-4 text-lg uppercase">
        <a href="#catalog" class="mobile-link">Каталог</a>
      </div>
    </div>
  </div>
</header>

<main class="pt-20">
  <section id="hero" class="relative deco-frame mb-6">
    <div class="absolute inset-0 pointer-events-none">
      <div class="deco-corner tl"></div><div class="deco-corner tr"></div><div class="deco-corner bl"></div><div class="deco-corner br"></div>
    </div>
    <div class="max-w-6xl mx-auto px-5 md:px-8 lg:px-12 py-8 flex flex-col items-center">
      <div class="w-full flex items-center justify-center relative">
        <img id="hero-img" class="hero-img fade-visible" src="assets/images/hero/hat1.jpg" alt="Шляпа" loading="lazy">
      </div>
      <div class="relative z-20 text-center mt-6">
        <h1 class="font-display text-3xl md:text-5xl lg:text-6xl">Австралийские шляпы и аксессуары</h1>
        <p class="mt-4 muted max-w-2xl mx-auto">Ручная работа. Кожа растительного дубления.</p>
        <div class="mt-6"><a href="#catalog" class="inline-flex gap-3 px-6 py-3 border border-deco-gold/60 text-deco-gold hover:bg-deco-gold hover:text-black rounded-sm uppercase tracking-wider">Смотреть коллекцию</a></div>
      </div>
    </div>
  </section>

  <section id="catalog" class="py-10 px-5 md:px-8 lg:px-12 max-w-7xl mx-auto">
    <div class="text-center mb-8">
      <div class="text-sm text-deco-gold/70 uppercase tracking-wide">Коллекция</div>
      <h2 class="font-display text-3xl md:text-4xl mt-3">Избранные работы</h2>
    </div>

    <div id="portfolio-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
  </section>

  <footer class="py-10 px-5 md:px-8 lg:px-12 border-t border-deco-gold/8">
    <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
      <div><div class="font-display text-deco-gold text-xl">KAIZEN & DECO</div><div class="muted text-sm mt-2">© <span id="year"></span></div></div>
      <div class="flex gap-5 mt-2"><a href="#" class="muted">Telegram</a></div>
    </div>
  </footer>
</main>

<!-- modal -->
<div id="product-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 modal-exit bg-black/70 backdrop-blur-sm" aria-hidden="true">
  <div class="relative bg-[#091118] border border-deco-gold/15 max-w-4xl w-full rounded-sm shadow-2xl overflow-hidden">
    <button id="modal-close" data-modal-close aria-label="Закрыть">✕</button>
    <div class="md:flex">
      <div class="md:w-1/2 bg-black/20 p-4">
        <div class="relative">
          <img id="modal-image" src="" alt="" class="w-full h-80 object-cover">
          <button id="prev-image" class="absolute left-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-black/50 text-deco-gold rounded-sm">‹</button>
          <button id="next-image" class="absolute right-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-black/50 text-deco-gold rounded-sm">›</button>
        </div>
        <div id="modal-thumbs" class="mt-3"></div>
      </div>
      <div class="md:w-1/2 p-6 flex flex-col gap-4">
        <div id="modal-status" class="inline-block px-3 py-1 text-xs uppercase font-medium border rounded-sm"></div>
        <h3 id="modal-title" class="font-display text-2xl"></h3>
        <p id="modal-description" class="muted text-sm"></p>
        <div class="mt-3"><div id="modal-price" class="text-deco-gold text-xl font-semibold"></div></div>
        <div class="mt-auto"><a id="modal-order-btn" class="inline-flex items-center gap-3 px-5 py-3 border border-deco-gold/70 text-deco-gold hover:bg-deco-gold hover:text-black rounded-sm">Заказать</a></div>
      </div>
    </div>
  </div>
</div>

<script>
/*
  Автодискавер изображений:
  - для hero: ищем assets/images/hero/hat1..hat3.(jpg|jpeg|png|webp|avif)
  - для карточек: ищем assets/images/item-N/01..15.(jpg|jpeg|png|webp|avif)
  Скрипт последовательно проверяет наличие и собирает список изображений, затем рендерит сетку.
*/

(function(){
  const exts = ['jpg','jpeg','png','webp','avif'];
  const heroBases = ['hat1','hat2','hat3'];
  const heroFolder = 'assets/images/hero/';
  const itemFolderBase = 'assets/images/item-';
  const MAX_PER_ITEM = 15;
  const placeholder = 'https://via.placeholder.com/1200x900?text=No+Image';

  // helper: check image existence with timeout
  function checkImage(url, timeout = 4000){
    return new Promise(resolve => {
      const img = new Image();
      let done = false;
      const onOk = () => { if(done) return; done = true; resolve(true); };
      const onErr = () => { if(done) return; done = true; resolve(false); };
      const to = setTimeout(onErr, timeout);
      img.onload = () => { clearTimeout(to); onOk(); };
      img.onerror = () => { clearTimeout(to); onErr(); };
      img.src = url;
    });
  }

  // find hero images
  const discoveredHero = [];
  (async function findHero(){
    for(const base of heroBases){
      for(const ext of exts){
        const url = `${heroFolder}${base}.${ext}`;
        // check
        // eslint-disable-next-line no-await-in-loop
        if(await checkImage(url)){
          discoveredHero.push(url);
          break; // next base
        }
      }
    }
    // fallback to remote if none found
    if(discoveredHero.length === 0){
      discoveredHero.push(
        'https://images.unsplash.com/photo-1521369909029-2aed41daa610?w=1600&h=900&fit=crop&crop=entropy',
        'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=1600&h=900&fit=crop&crop=entropy',
        'https://images.unsplash.com/photo-1588854337115-1c67d1a98b71?w=1600&h=900&fit=crop&crop=entropy'
      );
    }
    startHeroRotation(discoveredHero);
  })();

  // initial portfolioItems (keep titles, other meta). images arrays will be filled/expanded by discovery.
  window.portfolioItems = [
    {id:1, title:'Классическая акубра', price:'14 500 ₽', status:'В наличии', images:['assets/images/item-1/01.jpg'], description:'Австралийская акубра', orderLink:'#'},
    {id:2, title:'Федора', price:'12 000 ₽', status:'В наличии', images:['assets/images/item-2/01.jpg'], description:'Федора ручной формовки', orderLink:'#'},
    {id:3, title:'Сумка-тоут', price:'18 000 ₽', status:'Под заказ', images:['assets/images/item-3/01.jpg'], description:'Сумка-тоут', orderLink:'#'},
    {id:4, title:'Ремень', price:'8 500 ₽', status:'В наличии', images:['assets/images/item-4/01.jpg'], description:'Ремень ручной выделки', orderLink:'#'},
    {id:5, title:'Кошелёк', price:'4 200 ₽', status:'В наличии', images:['assets/images/item-5/01.jpg'], description:'Кошелёк-кардхолдер', orderLink:'#'},
    {id:6, title:'Шляпа-ковбой', price:'15 800 ₽', status:'Под заказ', images:['assets/images/item-6/01.jpg'], description:'Шляпа-ковбой', orderLink:'#'},
    {id:7, title:'Портфель', price:'22 000 ₽', status:'Под заказ', images:['assets/images/item-7/01.jpg'], description:'Классический портфель', orderLink:'#'},
    {id:8, title:'Мини-поясная сумка', price:'6 200 ₽', status:'В наличии', images:['assets/images/item-8/01.jpg'], description:'Мини-поясная сумка', orderLink:'#'}
  ];

  // discover images for a single item (01..MAX_PER_ITEM)
  async function discoverForItem(item){
    item.images = item.images || [];
    const known = new Set(item.images);
    for(let i=1;i<=MAX_PER_ITEM;i++){
      const num = String(i).padStart(2,'0');
      for(const ext of exts){
        const url = `${itemFolderBase}${item.id}/${num}.${ext}`;
        // skip known
        if(known.has(url)) break;
        // eslint-disable-next-line no-await-in-loop
        const ok = await checkImage(url, 2500);
        if(ok){ item.images.push(url); known.add(url); break; }
      }
    }
    // ensure at least one image (placeholder fallback)
    if(item.images.length === 0) item.images.push(placeholder);
  }

  // prepare all items sequentially to avoid too many concurrent requests
  async function prepareAllItems(){
    for(const it of window.portfolioItems){
      // try to expand images by discovery (non-blocking for UI but sequential here)
      // eslint-disable-next-line no-await-in-loop
      await discoverForItem(it);
    }
  }

  // render grid after discovery
  function renderGrid(){
    const grid = document.getElementById('portfolio-grid');
    if(!grid) return;
    grid.innerHTML = window.portfolioItems.map(item => {
      const thumb = (item.images && item.images.length) ? item.images[0] : placeholder;
      return `
        <article class="portfolio-card deco-frame rounded-sm overflow-hidden border border-transparent cursor-pointer" tabindex="0" data-id="${item.id}">
          <div class="aspect-[3/4] overflow-hidden relative"><img src="${thumb}" alt="${item.title}" class="w-full h-full object-cover" onerror="this.src='${placeholder}'"></div>
          <div class="p-4 flex flex-col h-36">
            <h3 class="font-display text-lg text-deco-warm/95">${item.title}</h3>
            <div class="mt-2 flex items-center justify-between">
              <div class="text-deco-gold font-semibold">${item.price}</div>
              <div class="text-xs muted uppercase">Подробнее →</div>
            </div>
          </div>
        </article>`;
    }).join('');
    attachGridHandlers();
  }

  // modal logic
  const modal = document.getElementById('product-modal');
  const modalImage = document.getElementById('modal-image');
  const modalTitle = document.getElementById('modal-title');
  const modalDescription = document.getElementById('modal-description');
  const modalPrice = document.getElementById('modal-price');
  const modalStatus = document.getElementById('modal-status');
  const modalOrderBtn = document.getElementById('modal-order-btn');
  const modalThumbs = document.getElementById('modal-thumbs');
  const prevBtn = document.getElementById('prev-image');
  const nextBtn = document.getElementById('next-image');
  let currentItem = null;
  let currentIndex = 0;

  function openModal(item){
    currentItem = item; currentIndex = 0; updateModal();
    modal.classList.remove('modal-exit'); modal.classList.add('modal-enter'); modal.setAttribute('aria-hidden','false'); modal.style.pointerEvents='auto'; document.body.style.overflow='hidden';
  }
  function updateModal(){
    if(!currentItem) return;
    modalImage.src = currentItem.images[currentIndex] || placeholder;
    modalImage.onerror = ()=> modalImage.src = placeholder;
    modalTitle.textContent = currentItem.title || '';
    modalDescription.textContent = currentItem.description || '';
    modalPrice.textContent = currentItem.price || '';
    modalStatus.textContent = currentItem.status || '';
    modalStatus.className = 'inline-block px-3 py-1 text-xs uppercase font-medium border rounded-sm ' + (currentItem.status === 'В наличии' ? 'border-emerald-600 text-emerald-400' : 'border-amber-500 text-amber-300');
    modalOrderBtn.href = currentItem.orderLink || '#';
    modalThumbs.innerHTML = (currentItem.images || []).map((s,idx)=>`<img src="${s}" data-idx="${idx}" onerror="this.src='${placeholder}'">`).join('');
  }
  function closeModal(){
    modal.classList.remove('modal-enter'); modal.classList.add('modal-exit'); modal.setAttribute('aria-hidden','true'); modal.style.pointerEvents='none'; document.body.style.overflow='';
    currentItem = null;
  }
  function showIndex(i){
    if(!currentItem) return;
    if(i < 0) i = currentItem.images.length - 1;
    if(i >= currentItem.images.length) i = 0;
    currentIndex = i; updateModal();
  }

  function attachGridHandlers(){
    const grid = document.getElementById('portfolio-grid');
    grid.querySelectorAll('.portfolio-card').forEach(card=>{
      card.addEventListener('click', ()=>{
        const id = +card.dataset.id;
        const item = window.portfolioItems.find(p => p.id === id);
        if(item) openModal(item);
      });
    });
  }

  // modal controls (robust)
  document.getElementById('modal-close').addEventListener('click', closeModal);
  modal.addEventListener('click', (e)=> { if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e)=> {
    if(e.key === 'Escape') closeModal();
    if(e.key === 'ArrowLeft') showIndex(currentIndex - 1);
    if(e.key === 'ArrowRight') showIndex(currentIndex + 1);
  });
  if(prevBtn) prevBtn.addEventListener('click', ()=> showIndex(currentIndex - 1));
  if(nextBtn) nextBtn.addEventListener('click', ()=> showIndex(currentIndex + 1));
  modalThumbs.addEventListener('click', (e)=> { const img = e.target.closest('img'); if(!img) return; showIndex(+img.dataset.idx); });

  // hero rotation
  function startHeroRotation(list){
    const heroEl = document.getElementById('hero-img');
    if(!heroEl || !list || list.length === 0) return;
    let idx = 0;
    heroEl.src = list[0];
    heroEl.onerror = function(){ /* if local fails, ignore, next will try other list items */ };
    setInterval(()=> {
      idx = (idx + 1) % list.length;
      const next = list[idx];
      heroEl.classList.add('opacity-0');
      setTimeout(()=> { heroEl.src = next; heroEl.classList.remove('opacity-0'); }, 260);
    }, 3000);
  }

  // initialization: discover items, then render
  (async function init(){
    // discover item images
    await prepareAllItems();
    // render grid now that images are discovered
    renderGrid();
    // discover hero images was started earlier; if not yet started, ensure fallback
    // findHero already called at top; but if startHeroRotation wasn't called, ensure fallback:
    // call findHero above already does startHeroRotation.
    // set year
    document.getElementById('year').textContent = new Date().getFullYear();
  })();

  // Expose closeModal so other guards can call it if needed
  window.closeModal = closeModal;

  // implement earlier findHero's startHeroRotation by capturing discoveredHero in closure:
  // (we called findHero at top which already invoked startHeroRotation)
})();
</script>
</body>
</html>
